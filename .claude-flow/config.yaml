# Claude-Flow Runtime Configuration (Pruned)
version: "3.0.0"

swarm:
  topology: hierarchical-mesh
  maxAgents: 8
  autoScale: false

memory:
  backend: hybrid
  enableHNSW: false
  persistPath: .claude-flow/data
  cacheSize: 50

# Disabled heavy modules
neural:
  enabled: false

embeddings:
  enabled: false

hive-mind:
  enabled: false

browser:
  enabled: false

aidefence:
  enabled: false

# Keep core essentials
hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: false
  port: 3000
